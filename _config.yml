locale: "en-CA"
site_theme: "default"
title: "bushtail's modding den"
title_separator: "-"
name: "bushtail's modding den"
description: "bushtail's modding den"
url: "https://bushtail.ca"
baseurl: ""
repository: "bushtail/bushtail.ca"

author:
  avatar: "profile.png"
  name: "bushtail"
  pronouns: "he/him"
  bio: "SPT mod dev, Unity mod dev, madman."
  location: "Ontario, Canada"
  uri: "https://bushtail.ca"
  email: "bushtail@bushtail.ca"
  github: "bushtail"

publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'
  conferences:
    title: 'Conference Papers'

teaser: "otag.png"
words_per_minute: 160
future: true
read_more: "disabled"

# Analytics
analytics:
  provider: "false" # false (default), "google", "google-universal", "google-analytics-4", "custom"
  google:
    tracking_id:

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

collections:
  motm:
    output: true
    permalink: /:collection/:path/
  spt:
    output: true
    permalink: /:collection/:path/
  other:
    output: true
    permalink: /:collection/:path/

defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  # _motm
  - scope:
      path: ""
      type: motm
    values:
      layout: single
      author_profile: true
      share: false
      comment: true
  # _spt
  - scope:
      path: ""
      type: spt
    values:
      layout: single
      author_profile: true
      share: false
      comment: true
  # _other
  - scope:
      path: ""
      type: other
    values:
      layout: single
      author_profile: true
      share: false
      comment: true

sass:
  sass_dir: _sass
  style: compressed # https://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style

permalink: /:categories/:title/

timezone: America/Toronto # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development
